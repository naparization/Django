{% extends "core/base.html" %}

{% block body %}
<div class="vstack gap-3">

    <div class="card text-bg-dark my-2 mx-3 w-100" style="max-width: 800px;">
        <div class="card-header">#{{chamado.id}} | {{chamado.CategoriaId.Nome}}</div>
        <div class="card-body">
            <h5 class="card-title">"{{chamado.Descricao}}"</h5>
            <p class="card-text">{{chamado.UsuarioId.first_name}}</p>
            <a class="btn btn-light" href="{% url 'comentarios' chamado.id %}">Comentários</a>
        </div>
    </div>

    <h1>Comentários:</h1>

    {% for comentario in comentarios %}

    <div class="card">
        <div class="card-header">
            AAA
        </div>
        <div class="card-body">
            <blockquote class="blockquote mb-0">
                <p>"{{comentario.Mensagem}}"</p>
                <footer class="blockquote-footer">Usuário</footer>
            </blockquote>
        </div>
    </div>

    {% endfor %}

</div>


{% endblock %}
